name: Daily Stock Data Fetch Test

on:
  workflow_dispatch:
  schedule:
    - cron: '30 8 * * 1-5'

jobs:
  fetch-stock-data:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      SYMBOL_REFRESH_MODE: weekly
      SYMBOL_REFRESH_WEEKDAY: 6
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary requests yfinance beautifulsoup4 lxml

      - name: Run stock fetch script
        run: |
          python3 -u <<'PYTHON_SCRIPT'
          import os
          import sys
          import time
          import threading
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from datetime import date, datetime, timedelta

          import psycopg2
          import requests
          import yfinance as yf
          from bs4 import BeautifulSoup
          from psycopg2.extras import execute_values
          from requests.adapters import HTTPAdapter
          from urllib3.util.retry import Retry

          sys.stdout.flush()
          sys.stderr.flush()

          HEADERS = {
              "User-Agent": (
                  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                  "AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
              ),
              "Accept": "text/html,application/json,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "zh-TW,zh;q=0.9,en-US;q=0.8,en;q=0.7",
              "Connection": "keep-alive",
          }

          INSERT_SQL = """
          INSERT INTO tw_stock_prices
          (symbol, date, open_price, high_price, low_price, close_price, volume)
          VALUES %s
          ON CONFLICT (symbol, date)
          DO UPDATE SET
              open_price = EXCLUDED.open_price,
              high_price = EXCLUDED.high_price,
              low_price = EXCLUDED.low_price,
              close_price = EXCLUDED.close_price,
              volume = EXCLUDED.volume
          """

          CREATE_PRICES_SQL = """
          CREATE TABLE IF NOT EXISTS tw_stock_prices (
              symbol TEXT NOT NULL,
              date DATE NOT NULL,
              open_price DOUBLE PRECISION,
              high_price DOUBLE PRECISION,
              low_price DOUBLE PRECISION,
              close_price DOUBLE PRECISION,
              volume BIGINT,
              created_at TIMESTAMPTZ DEFAULT NOW(),
              updated_at TIMESTAMPTZ DEFAULT NOW(),
              PRIMARY KEY (symbol, date)
          )
          """

          CREATE_PRICES_INDEX_SQL = """
          CREATE INDEX IF NOT EXISTS idx_tw_stock_prices_date
          ON tw_stock_prices (date)
          """

          CREATE_RETURNS_SQL = """
          CREATE TABLE IF NOT EXISTS tw_stock_returns (
              symbol TEXT NOT NULL,
              date DATE NOT NULL,
              daily_return DOUBLE PRECISION,
              weekly_return DOUBLE PRECISION,
              monthly_return DOUBLE PRECISION,
              quarterly_return DOUBLE PRECISION,
              yearly_return DOUBLE PRECISION,
              created_at TIMESTAMPTZ DEFAULT NOW(),
              updated_at TIMESTAMPTZ DEFAULT NOW(),
              PRIMARY KEY (symbol, date)
          )
          """

          CREATE_RETURNS_INDEX_SQL = """
          CREATE INDEX IF NOT EXISTS idx_tw_stock_returns_date
          ON tw_stock_returns (date)
          """

          CREATE_SYMBOLS_SQL = """
          CREATE TABLE IF NOT EXISTS tw_stock_symbols (
              symbol TEXT PRIMARY KEY,
              market TEXT,
              updated_at TIMESTAMPTZ DEFAULT NOW()
          )
          """

          def build_session():
              session = requests.Session()
              retry = Retry(
                  total=2,
                  connect=2,
                  read=2,
                  backoff_factor=0.6,
                  status_forcelist=[429, 500, 502, 503, 504],
                  allowed_methods=["HEAD", "GET", "OPTIONS", "POST"],
                  raise_on_status=False,
              )
              adapter = HTTPAdapter(pool_connections=50, pool_maxsize=50, max_retries=retry)
              session.mount("http://", adapter)
              session.mount("https://", adapter)
              session.headers.update(HEADERS)
              return session

          def ensure_tables(conn):
              with conn.cursor() as cur:
                  cur.execute(CREATE_PRICES_SQL)
                  cur.execute(CREATE_PRICES_INDEX_SQL)
                  cur.execute(CREATE_RETURNS_SQL)
                  cur.execute(CREATE_RETURNS_INDEX_SQL)
                  cur.execute(CREATE_SYMBOLS_SQL)

                  cur.execute("""
                      ALTER TABLE tw_stock_returns
                      ADD COLUMN IF NOT EXISTS daily_return DOUBLE PRECISION
                  """)
                  cur.execute("""
                      ALTER TABLE tw_stock_returns
                      ADD COLUMN IF NOT EXISTS weekly_return DOUBLE PRECISION
                  """)
                  cur.execute("""
                      ALTER TABLE tw_stock_returns
                      ADD COLUMN IF NOT EXISTS monthly_return DOUBLE PRECISION
                  """)
                  cur.execute("""
                      ALTER TABLE tw_stock_returns
                      ADD COLUMN IF NOT EXISTS quarterly_return DOUBLE PRECISION
                  """)
                  cur.execute("""
                      ALTER TABLE tw_stock_returns
                      ADD COLUMN IF NOT EXISTS yearly_return DOUBLE PRECISION
                  """)
                  cur.execute("""
                      ALTER TABLE tw_stock_returns
                      ADD COLUMN IF NOT EXISTS created_at TIMESTAMPTZ DEFAULT NOW()
                  """)
                  cur.execute("""
                      ALTER TABLE tw_stock_returns
                      ADD COLUMN IF NOT EXISTS updated_at TIMESTAMPTZ DEFAULT NOW()
                  """)

              conn.commit()

          class IncrementalWriter:
              def __init__(self, conn, batch_size=500):
                  self.conn = conn
                  self.batch_size = batch_size
                  self.buffer = []
                  self.lock = threading.Lock()
                  self.total_written = 0

              def add_rows(self, rows):
                  if not rows:
                      return
                  should_flush = False
                  with self.lock:
                      self.buffer.extend(rows)
                      if len(self.buffer) >= self.batch_size:
                          should_flush = True
                  if should_flush:
                      self.flush()

              def flush(self):
                  with self.lock:
                      if not self.buffer:
                          return
                      rows = self.buffer
                      self.buffer = []

                  with self.conn.cursor() as cur:
                      execute_values(cur, INSERT_SQL, rows, page_size=min(1000, len(rows)))
                  self.conn.commit()
                  self.total_written += len(rows)
                  print(f"  已寫入 {len(rows)} 筆，累計 {self.total_written} 筆", flush=True)

              def close(self):
                  self.flush()

          def should_refresh_symbols():
              refresh_mode = os.getenv("SYMBOL_REFRESH_MODE", "weekly").strip().lower()
              today = date.today()

              if refresh_mode == "daily":
                  return True

              if refresh_mode == "weekly":
                  refresh_weekday = int(os.getenv("SYMBOL_REFRESH_WEEKDAY", "6"))
                  return today.weekday() == refresh_weekday

              if refresh_mode == "monthly":
                  refresh_day = int(os.getenv("SYMBOL_REFRESH_DAY", "1"))
                  return today.day == refresh_day

              return False

          def get_symbols_from_cache(conn):
              try:
                  with conn.cursor() as cur:
                      cur.execute("""
                          SELECT symbol
                          FROM tw_stock_symbols
                          WHERE symbol IS NOT NULL
                            AND btrim(symbol) <> ''
                            AND symbol ~ '^[0-9]{4}$'
                          ORDER BY symbol
                      """)
                      rows = cur.fetchall()

                  symbols = [row[0].strip() for row in rows if row and row[0]]
                  if symbols:
                      print(f"  使用快取股票清單：{len(symbols)} 檔", flush=True)
                  else:
                      print("  快取股票清單為空", flush=True)
                  return symbols
              except Exception as err:
                  print(f"  讀取快取股票清單失敗：{err}", flush=True)
                  return []

          def save_symbols_to_cache(conn, symbols, market="ALL"):
              if not symbols:
                  return

              rows = [(symbol, market) for symbol in sorted(set(symbols))]

              with conn.cursor() as cur:
                  execute_values(
                      cur,
                      """
                      INSERT INTO tw_stock_symbols (symbol, market, updated_at)
                      VALUES %s
                      ON CONFLICT (symbol)
                      DO UPDATE SET
                          market = EXCLUDED.market,
                          updated_at = NOW()
                      """,
                      rows,
                  )
              conn.commit()
              print(f"  已更新股票清單快取：{len(rows)} 檔", flush=True)

          def get_symbols_from_prices(conn):
              try:
                  with conn.cursor() as cur:
                      cur.execute("""
                          SELECT DISTINCT symbol
                          FROM tw_stock_prices
                          WHERE symbol IS NOT NULL
                            AND btrim(symbol) <> ''
                            AND symbol ~ '^[0-9]{4}$'
                          ORDER BY symbol
                      """)
                      rows = cur.fetchall()

                  symbols = [row[0].strip() for row in rows if row and row[0]]
                  if symbols:
                      print(f"  使用價格表既有股票清單：{len(symbols)} 檔", flush=True)
                  else:
                      print("  價格表內尚無既有股票清單", flush=True)
                  return symbols
              except Exception as err:
                  print(f"  從價格表讀取股票清單失敗：{err}", flush=True)
                  return []

          def fetch_twse_listed_symbols(session):
              print("  嘗試抓取上市股票清單（TWSE ISIN）...", flush=True)
              url = "https://isin.twse.com.tw/isin/C_public.jsp?strMode=2"
              resp = session.get(url, timeout=(5, 12))
              resp.raise_for_status()
              resp.encoding = "big5"

              soup = BeautifulSoup(resp.text, "html.parser")
              symbols = []

              for tr in soup.select("table tr"):
                  tds = tr.find_all("td")
                  if not tds:
                      continue
                  text = tds[0].get_text(" ", strip=True)
                  if not text or "有價證券代號" in text:
                      continue
                  parts = text.split()
                  if not parts:
                      continue
                  code = parts[0].strip()
                  if code.isdigit() and len(code) == 4:
                      symbols.append(code)

              symbols = sorted(set(symbols))
              print(f"  TWSE ISIN 取得上市股票 {len(symbols)} 檔", flush=True)
              return symbols

          def fetch_mops_listed_symbols(session):
              print("  嘗試抓取上市股票清單（MOPS）...", flush=True)
              url = "https://mops.twse.com.tw/mops/web/ajax_t51sb01"
              data = {
                  "encodeURIComponent": "1",
                  "step": "1",
                  "firstin": "1",
                  "TYPEK": "sii",
                  "code": "",
              }
              resp = session.post(
                  url,
                  data=data,
                  timeout=(5, 12),
                  headers={
                      **HEADERS,
                      "Content-Type": "application/x-www-form-urlencoded",
                      "Referer": "https://mops.twse.com.tw/mops/web/t51sb01",
                  },
              )
              resp.raise_for_status()
              resp.encoding = "utf-8"

              soup = BeautifulSoup(resp.text, "html.parser")
              symbols = []

              for tr in soup.select("table tr"):
                  tds = tr.find_all("td")
                  if len(tds) < 2:
                      continue
                  code = tds[0].get_text(strip=True)
                  if code.isdigit() and len(code) == 4:
                      symbols.append(code)

              symbols = sorted(set(symbols))
              print(f"  MOPS 取得上市股票 {len(symbols)} 檔", flush=True)
              return symbols

          def fetch_tpex_listed_symbols(session):
              print("  嘗試抓取上櫃股票清單（TPEX）...", flush=True)
              candidates = [
                  "https://www.tpex.org.tw/openapi/v1/tpex_mainboard_quotes",
                  "https://www.tpex.org.tw/openapi/v1/tpex_daily_market_value",
                  "https://www.tpex.org.tw/openapi/v1/market_value",
              ]

              last_err = None
              for url in candidates:
                  try:
                      resp = session.get(url, timeout=(5, 12))
                      resp.raise_for_status()
                      data = resp.json()
                      symbols = []
                      if isinstance(data, list):
                          for item in data:
                              if not isinstance(item, dict):
                                  continue
                              for key in ("SecuritiesCompanyCode", "股票代號", "代號", "CompanyCode", "Code"):
                                  value = str(item.get(key, "")).strip()
                                  if value.isdigit() and len(value) == 4:
                                      symbols.append(value)
                                      break
                      symbols = sorted(set(symbols))
                      if symbols:
                          print(f"  TPEX 取得上櫃股票 {len(symbols)} 檔", flush=True)
                          return symbols
                  except Exception as err:
                      last_err = err
                      continue

              if last_err:
                  raise last_err
              return []

          def get_stock_symbols(conn, session):
              print("取得股票清單...", flush=True)

              refresh_needed = should_refresh_symbols()
              print(f"  本次是否強制更新股票清單：{'是' if refresh_needed else '否'}", flush=True)

              if not refresh_needed:
                  cached_symbols = get_symbols_from_cache(conn)
                  if cached_symbols:
                      return cached_symbols

                  db_symbols = get_symbols_from_prices(conn)
                  if db_symbols:
                      return db_symbols

              sources = [
                  ("TWSE_ISIN", fetch_twse_listed_symbols),
                  ("MOPS", fetch_mops_listed_symbols),
              ]

              listed_symbols = []
              for source_name, source_fn in sources:
                  try:
                      started = time.time()
                      listed_symbols = source_fn(session)
                      elapsed = time.time() - started
                      if listed_symbols:
                          print(f"  {source_name} 成功，耗時 {elapsed:.1f} 秒", flush=True)
                          break
                  except Exception as err:
                      print(f"  {source_name} 失敗：{err}", flush=True)

              try:
                  tpex_symbols = fetch_tpex_listed_symbols(session)
              except Exception as err:
                  print(f"  TPEX 股票清單抓取失敗：{err}", flush=True)
                  tpex_symbols = []

              symbols = sorted(set(listed_symbols + tpex_symbols))
              if not symbols:
                  fallback_symbols = get_symbols_from_cache(conn)
                  if fallback_symbols:
                      print("  外部股票清單更新失敗，改用快取清單", flush=True)
                      return fallback_symbols

                  fallback_symbols = get_symbols_from_prices(conn)
                  if fallback_symbols:
                      print("  外部股票清單更新失敗，改用價格表既有清單", flush=True)
                      return fallback_symbols

                  raise RuntimeError("無法取得任何股票清單")

              save_symbols_to_cache(conn, symbols, market="ALL")
              print(f"股票清單取得完成，共 {len(symbols)} 檔", flush=True)
              return symbols

          def normalize_price_row(symbol, hist_row):
              idx = hist_row.name
              if hasattr(idx, "date"):
                  trade_date = idx.date()
              else:
                  trade_date = idx

              open_price = hist_row.get("Open")
              high_price = hist_row.get("High")
              low_price = hist_row.get("Low")
              close_price = hist_row.get("Close")
              volume = hist_row.get("Volume")

              if close_price is None:
                  return None

              return (
                  symbol,
                  trade_date,
                  float(open_price) if open_price is not None else None,
                  float(high_price) if high_price is not None else None,
                  float(low_price) if low_price is not None else None,
                  float(close_price) if close_price is not None else None,
                  int(volume) if volume is not None else 0,
              )

          def fetch_single_stock_history(symbol, start_date, end_date):
              candidates = [f"{symbol}.TW", f"{symbol}.TWO"]
              last_err = None

              for ticker_symbol in candidates:
                  try:
                      ticker = yf.Ticker(ticker_symbol)
                      hist = ticker.history(
                          start=start_date.strftime("%Y-%m-%d"),
                          end=(end_date + timedelta(days=1)).strftime("%Y-%m-%d"),
                          auto_adjust=False,
                          actions=False,
                      )

                      if hist is None or hist.empty:
                          continue

                      rows = []
                      for _, row in hist.iterrows():
                          normalized = normalize_price_row(symbol, row)
                          if normalized:
                              rows.append(normalized)

                      if rows:
                          return rows

                  except Exception as err:
                      last_err = err
                      continue

              if last_err:
                  print(f"  {symbol} 所有候選代碼皆失敗：{last_err}", flush=True)
                  return []

              return []

          def fetch_market(symbols, writer, start_date, end_date, max_workers=8):
              print(f"開始抓取股價資料，共 {len(symbols)} 檔", flush=True)

              completed = 0
              success_count = 0
              fail_count = 0

              with ThreadPoolExecutor(max_workers=max_workers) as executor:
                  future_to_symbol = {
                      executor.submit(fetch_single_stock_history, symbol, start_date, end_date): symbol
                      for symbol in symbols
                  }

                  for future in as_completed(future_to_symbol):
                      symbol = future_to_symbol[future]
                      completed += 1
                      try:
                          rows = future.result()
                          if rows:
                              writer.add_rows(rows)
                              success_count += 1
                              print(f"  [{completed}/{len(symbols)}] {symbol} 成功，{len(rows)} 筆", flush=True)
                          else:
                              print(f"  [{completed}/{len(symbols)}] {symbol} 無資料", flush=True)
                      except Exception as err:
                          fail_count += 1
                          print(f"  [{completed}/{len(symbols)}] {symbol} 抓取失敗：{err}", flush=True)

              writer.flush()
              print(f"股價抓取完成：成功 {success_count} 檔，失敗 {fail_count} 檔", flush=True)

          def compute_returns(conn):
              print("開始計算報酬率...", flush=True)

              sql = """
              INSERT INTO tw_stock_returns
              (symbol, date, daily_return, weekly_return, monthly_return, quarterly_return, yearly_return, updated_at)
              WITH base AS (
                  SELECT
                      symbol,
                      date,
                      close_price,
                      LAG(close_price, 1) OVER (PARTITION BY symbol ORDER BY date) AS close_1d,
                      LAG(close_price, 5) OVER (PARTITION BY symbol ORDER BY date) AS close_1w,
                      LAG(close_price, 21) OVER (PARTITION BY symbol ORDER BY date) AS close_1m,
                      LAG(close_price, 63) OVER (PARTITION BY symbol ORDER BY date) AS close_3m,
                      LAG(close_price, 252) OVER (PARTITION BY symbol ORDER BY date) AS close_1y
                  FROM tw_stock_prices
              )
              SELECT
                  symbol,
                  date,
                  CASE WHEN close_1d IS NULL OR close_1d = 0 THEN NULL ELSE (close_price / close_1d) - 1 END AS daily_return,
                  CASE WHEN close_1w IS NULL OR close_1w = 0 THEN NULL ELSE (close_price / close_1w) - 1 END AS weekly_return,
                  CASE WHEN close_1m IS NULL OR close_1m = 0 THEN NULL ELSE (close_price / close_1m) - 1 END AS monthly_return,
                  CASE WHEN close_3m IS NULL OR close_3m = 0 THEN NULL ELSE (close_price / close_3m) - 1 END AS quarterly_return,
                  CASE WHEN close_1y IS NULL OR close_1y = 0 THEN NULL ELSE (close_price / close_1y) - 1 END AS yearly_return,
                  NOW()
              FROM base
              ON CONFLICT (symbol, date)
              DO UPDATE SET
                  daily_return = EXCLUDED.daily_return,
                  weekly_return = EXCLUDED.weekly_return,
                  monthly_return = EXCLUDED.monthly_return,
                  quarterly_return = EXCLUDED.quarterly_return,
                  yearly_return = EXCLUDED.yearly_return,
                  updated_at = NOW()
              """

              with conn.cursor() as cur:
                  cur.execute(sql)
              conn.commit()
              print("報酬率計算完成", flush=True)

          def fetch_index_data(conn, target_date):
              print("抓取指數資料...", flush=True)
              index_map = {
                  "^TWII": "TWII",
                  "^TWOII": "TWOII",
              }

              rows = []
              for yf_symbol, db_symbol in index_map.items():
                  try:
                      hist = yf.Ticker(yf_symbol).history(
                          start=(target_date - timedelta(days=10)).strftime("%Y-%m-%d"),
                          end=(target_date + timedelta(days=1)).strftime("%Y-%m-%d"),
                          auto_adjust=False,
                          actions=False,
                      )
                      if hist is None or hist.empty:
                          continue
                      hist = hist.tail(1)
                      for _, row in hist.iterrows():
                          normalized = normalize_price_row(db_symbol, row)
                          if normalized:
                              rows.append(normalized)
                  except Exception as err:
                      print(f"  指數 {db_symbol} 抓取失敗：{err}", flush=True)

              if rows:
                  with conn.cursor() as cur:
                      execute_values(cur, INSERT_SQL, rows)
                  conn.commit()
                  print(f"指數資料寫入完成，共 {len(rows)} 筆", flush=True)
              else:
                  print("無指數資料可寫入", flush=True)

          def main():
              conn = None
              session = None

              try:
                  print("開始執行股價資料抓取任務", flush=True)
                  print("=" * 80, flush=True)
                  print(f"執行時間：{datetime.now()}", flush=True)

                  target_date = date.today()
                  start_date = target_date - timedelta(days=370)
                  end_date = target_date

                  print(f"目標日期：{target_date}", flush=True)

                  database_url = os.getenv("NEON_DATABASE_URL")
                  if not database_url:
                      raise RuntimeError("缺少環境變數 NEON_DATABASE_URL")

                  print("正在連接 Neon 資料庫...", flush=True)
                  conn = psycopg2.connect(database_url, sslmode="require")
                  conn.autocommit = False
                  print("已連接到 Neon 資料庫", flush=True)

                  ensure_tables(conn)
                  session = build_session()

                  symbols = get_stock_symbols(conn, session)

                  writer = IncrementalWriter(conn, batch_size=500)
                  fetch_market(symbols, writer, start_date, end_date, max_workers=8)
                  writer.close()

                  fetch_index_data(conn, target_date)
                  compute_returns(conn)

                  print("=" * 80, flush=True)
                  print("任務完成", flush=True)

              except Exception as err:
                  print(f"執行過程發生錯誤：{err}", flush=True)
                  import traceback
                  traceback.print_exc()
                  sys.exit(1)
              finally:
                  if session is not None:
                      try:
                          session.close()
                      except Exception:
                          pass
                  if conn is not None:
                      try:
                          conn.close()
                      except Exception:
                          pass

          if __name__ == "__main__":
              main()
          PYTHON_SCRIPT

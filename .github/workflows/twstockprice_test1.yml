name: Daily Stock Data Fetch

on:
  schedule:
    # 週一到週五 11:57 台北時間（UTC 03:57）
    - cron: '57 3 * * 1-5'
  workflow_dispatch:

env:
  TZ: Asia/Taipei

jobs:
  fetch-stock-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests psycopg2-binary yfinance

      - name: Fetch stock data and sync to Neon, then compute returns
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          PYTHONUNBUFFERED: 1
        run: |
          python3 -u << 'PYTHON_SCRIPT'
          import os
          import re
          import sys
          import time
          import threading
          from concurrent.futures import ThreadPoolExecutor, TimeoutError as FuturesTimeoutError
          from datetime import date, datetime, timedelta

          import psycopg2
          import requests
          import yfinance as yf
          from psycopg2.extras import execute_values
          from requests.adapters import HTTPAdapter
          from urllib3.util.retry import Retry

          sys.stdout.flush()
          sys.stderr.flush()

          HEADERS = {
              "User-Agent": (
                  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                  "AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
              ),
              "Accept": "application/json,text/plain,*/*",
              "Accept-Language": "zh-TW,zh;q=0.9,en-US;q=0.8,en;q=0.7",
          }

          TWSE_REFERER = "https://www.twse.com.tw/zh/trading/historical/mi-index.html"
          TPEX_REFERER = "https://www.tpex.org.tw/web/stock/aftertrading/otc_quotes_no1430.php"


          def make_session():
              session = requests.Session()
              session.headers.update(HEADERS)
              # 關閉 urllib3 自動重試，避免「設定 20s 卻等數分鐘」
              retry = Retry(total=0, connect=0, read=0, redirect=0, status=0)
              session.mount("https://", HTTPAdapter(max_retries=retry))
              return session


          SESSION = make_session()
          TWSE_WARM_CONNECT_TIMEOUT = 3
          TWSE_WARM_READ_TIMEOUT = 8
          TWSE_API_CONNECT_TIMEOUT = 5
          TWSE_API_READ_TIMEOUT = 45


          def format_timeout_label(timeout):
              if isinstance(timeout, (tuple, list)) and len(timeout) == 2:
                  return f"connect={timeout[0]}s/read={timeout[1]}s"
              return f"{timeout}s"


          def hard_timeout_get(url, params=None, headers=None, timeout=(5, 30), deadline=30, label="HTTP"):
              """硬性總時限 + connect/read 分離 timeout，避免慢速回應拖過上限。"""
              connect_timeout, read_timeout = timeout
              merged_headers = dict(headers or {})
              query = ""
              if params:
                  query = "?" + "&".join(f"{k}={v}" for k, v in params.items())
              timeout_label = format_timeout_label(timeout)
              log_diag(f"{label} 開始請求（{timeout_label}，硬性上限 {deadline}s）")
              log_diag(f"{label} URL: {url}{query}", indent=1)

              done = threading.Event()
              start = time.perf_counter()

              def heartbeat():
                  tick = 0
                  while not done.wait(5):
                      tick += 1
                      elapsed = diag_elapsed(start)
                      log_diag(
                          f"{label} 仍在等待回應… 已 {elapsed:.1f}s "
                          f"(heartbeat #{tick}，硬性上限 {deadline}s)",
                          indent=1,
                      )
                      if elapsed >= deadline:
                          break

              watcher = threading.Thread(target=heartbeat, daemon=True)
              watcher.start()
              try:
                  with ThreadPoolExecutor(max_workers=1) as executor:
                      future = executor.submit(
                          SESSION.get,
                          url,
                          params=params,
                          headers=merged_headers,
                          timeout=(connect_timeout, read_timeout),
                      )
                      response = future.result(timeout=deadline)
              except FuturesTimeoutError as err:
                  raise requests.Timeout(
                      f"{label} 超過硬性上限 {deadline}s（connect={connect_timeout}s/read={read_timeout}s）"
                  ) from err
              finally:
                  done.set()

              elapsed = diag_elapsed(start)
              size = len(response.content or b"")
              log_diag(
                  f"{label} 收到回應：HTTP {response.status_code}，"
                  f"{size:,} bytes，耗時 {elapsed:.2f}s",
                  indent=1,
              )
              return response, elapsed


          def diag_ts():
              return datetime.now().strftime("%H:%M:%S")


          def diag_elapsed(start):
              return time.perf_counter() - start


          def log_diag(message, indent=0):
              prefix = "  " * indent
              print(f"{prefix}🔍 [{diag_ts()}] {message}", flush=True)


          def http_get_with_diag(url, params=None, headers=None, timeout=90, deadline=None, label="HTTP"):
              if isinstance(timeout, (int, float)):
                  connect_timeout = TWSE_API_CONNECT_TIMEOUT
                  read_timeout = int(timeout)
              else:
                  connect_timeout, read_timeout = timeout
              if deadline is None:
                  deadline = read_timeout + connect_timeout + 5
              return hard_timeout_get(
                  url,
                  params=params,
                  headers=headers,
                  timeout=(connect_timeout, read_timeout),
                  deadline=deadline,
                  label=label,
              )


          def get_json(url, params=None, referer=None, timeout=90, retries=2, label="JSON"):
              extra_headers = {"Referer": referer} if referer else {}
              last_error = None
              for attempt in range(1, retries + 1):
                  try:
                      response, elapsed = http_get_with_diag(
                          url,
                          params=params,
                          headers=extra_headers,
                          timeout=timeout,
                          label=f"{label} (第 {attempt}/{retries} 次)",
                      )
                      if response.status_code == 451:
                          raise requests.HTTPError(
                              f"451 blocked by upstream for {url}", response=response
                          )
                      response.raise_for_status()
                      log_diag(f"{label} JSON 解析完成，總耗時 {elapsed:.2f}s", indent=1)
                      return response.json()
                  except Exception as err:
                      last_error = err
                      status = getattr(getattr(err, "response", None), "status_code", None)
                      if status == 451:
                          log_diag(f"{label} 被上游封鎖 (451)，停止重試", indent=1)
                          raise last_error
                      wait = min(15, 2 ** attempt)
                      log_diag(
                          f"{label} 請求失敗 ({attempt}/{retries}): {err}，{wait}s 後重試…",
                          indent=1,
                      )
                      time.sleep(wait)
              raise last_error


          def warm_twse_session():
              log_diag("TWSE 暖機：略過首頁，只嘗試 MI_INDEX 參考頁（最多 10s）")
              warm_start = time.perf_counter()
              try:
                  response, _ = hard_timeout_get(
                      TWSE_REFERER,
                      headers={"Referer": "https://www.twse.com.tw/zh/"},
                      timeout=(TWSE_WARM_CONNECT_TIMEOUT, TWSE_WARM_READ_TIMEOUT),
                      deadline=10,
                      label="TWSE 暖機/MI_INDEX 參考頁",
                  )
                  log_diag(
                      f"TWSE 暖機/MI_INDEX 參考頁 完成：HTTP {response.status_code}，"
                      f"耗時 {diag_elapsed(warm_start):.2f}s",
                      indent=1,
                  )
              except Exception as err:
                  log_diag(
                      f"TWSE 暖機失敗（可忽略，直接打 MI_INDEX API）：{err}，"
                      f"耗時 {diag_elapsed(warm_start):.2f}s",
                      indent=1,
                  )
              log_diag(f"TWSE 暖機總耗時 {diag_elapsed(warm_start):.2f}s")


          def fetch_twse_mi_index_json(query_date):
              fetch_start = time.perf_counter()
              log_diag(f"MI_INDEX 查詢日期：{query_date}")
              warm_twse_session()
              params = {"response": "json", "date": query_date, "type": "ALLBUT0999"}
              sources = [
                  ("exchangeReport", "https://www.twse.com.tw/exchangeReport/MI_INDEX"),
                  ("rwd", "https://www.twse.com.tw/rwd/zh/afterTrading/MI_INDEX"),
              ]
              last_error = None
              for index, (name, url) in enumerate(sources, start=1):
                  source_start = time.perf_counter()
                  log_diag(f"MI_INDEX 來源 {index}/{len(sources)}：{name}")
                  try:
                      response, elapsed = http_get_with_diag(
                          url,
                          params=params,
                          headers={"Referer": TWSE_REFERER},
                          timeout=(TWSE_API_CONNECT_TIMEOUT, TWSE_API_READ_TIMEOUT),
                          deadline=50,
                          label=f"TWSE MI_INDEX/{name}",
                      )
                      if response.status_code == 451:
                          log_diag(f"{name} 被 TWSE 封鎖 (451)，改試下一來源", indent=1)
                          last_error = requests.HTTPError(f"451 blocked ({name})")
                          continue
                      response.raise_for_status()
                      parse_start = time.perf_counter()
                      data = response.json()
                      parse_elapsed = diag_elapsed(parse_start)
                      stat = data.get("stat")
                      tables = data.get("tables") or []
                      row_count = sum(len((table or {}).get("data") or []) for table in tables)
                      log_diag(
                          f"{name} JSON stat={stat!r}，tables={len(tables)}，rows≈{row_count}，"
                          f"解析 {parse_elapsed:.2f}s",
                          indent=1,
                      )
                      if stat == "OK":
                          log_diag(
                              f"MI_INDEX 成功來源：{name}，本來源 {diag_elapsed(source_start):.2f}s，"
                              f"總耗時 {diag_elapsed(fetch_start):.2f}s",
                          )
                          print(f"  ✅ TWSE 來源：{name}", flush=True)
                          return data
                      last_error = ValueError(stat or "unknown stat")
                      log_diag(f"{name} 回傳 stat 非 OK：{stat!r}", indent=1)
                  except Exception as err:
                      last_error = err
                      log_diag(
                          f"{name} 失敗: {err}，本來源耗時 {diag_elapsed(source_start):.2f}s",
                          indent=1,
                      )
                      print(f"  ⚠️ {name} 失敗: {err}", flush=True)
              log_diag(f"MI_INDEX 全部來源失敗，總耗時 {diag_elapsed(fetch_start):.2f}s")
              raise last_error or RuntimeError("所有 TWSE MI_INDEX 來源均失敗")


          def normalize_base_symbol(raw):
              value = str(raw or "").strip().upper()
              if value.endswith(".TW"):
                  return value[:-3], "TWSE"
              if value.endswith(".TWO"):
                  return value[:-4], "TPEX"
              return value, None


          def load_symbols_from_db(conn, market):
              twse_symbols = []
              tpex_symbols = []

              try:
                  with conn.cursor() as cur:
                      cur.execute(
                          """
                          SELECT symbol, market
                          FROM tw_stock_symbols
                          WHERE symbol IS NOT NULL
                            AND btrim(symbol) <> ''
                          ORDER BY symbol
                          """
                      )
                      rows = cur.fetchall()
                  for symbol, market_value in rows:
                      base_symbol, inferred_market = normalize_base_symbol(symbol)
                      if not is_common_stock_code(base_symbol):
                          continue
                      market_text = str(market_value or inferred_market or "").strip().upper()
                      if market_text in ("TWSE", "SII", "LISTED", "上市"):
                          twse_symbols.append(base_symbol)
                      elif market_text in ("TPEX", "OTC", "TWO", "上櫃"):
                          tpex_symbols.append(base_symbol)
                      elif str(symbol).upper().endswith(".TW"):
                          twse_symbols.append(base_symbol)
                      elif str(symbol).upper().endswith(".TWO"):
                          tpex_symbols.append(base_symbol)
              except Exception as err:
                  print(f"⚠️ 讀取 tw_stock_symbols 失敗：{err}", flush=True)

              if not twse_symbols and not tpex_symbols:
                  try:
                      with conn.cursor() as cur:
                          cur.execute(
                              """
                              SELECT DISTINCT symbol
                              FROM tw_stock_prices
                              WHERE symbol IS NOT NULL
                                AND btrim(symbol) <> ''
                              ORDER BY symbol
                              """
                          )
                          rows = cur.fetchall()
                      for (symbol,) in rows:
                          base_symbol, inferred_market = normalize_base_symbol(symbol)
                          if not is_common_stock_code(base_symbol):
                              continue
                          if inferred_market == "TWSE":
                              twse_symbols.append(base_symbol)
                          elif inferred_market == "TPEX":
                              tpex_symbols.append(base_symbol)
                  except Exception as err:
                      print(f"⚠️ 讀取 tw_stock_prices 失敗：{err}", flush=True)

              twse_symbols = sorted(set(twse_symbols))
              tpex_symbols = sorted(set(tpex_symbols))

              if market == "TWSE":
                  print(f"  📋 DB 上市清單：{len(twse_symbols)} 檔", flush=True)
                  return twse_symbols
              print(f"  📋 DB 上櫃清單：{len(tpex_symbols)} 檔", flush=True)
              return tpex_symbols


          def yfinance_row_for_ticker(data, ticker, multi_ticker):
              if data is None or getattr(data, "empty", True):
                  return None
              if not multi_ticker:
                  return data.iloc[0]
              if ticker not in data.columns.get_level_values(0):
                  return None
              subset = data[ticker].dropna(how="all")
              if subset.empty:
                  return None
              return subset.iloc[0]


          def fetch_market_yfinance_fallback(writer, target_date, symbols, suffix, label):
              if not symbols:
                  print(f"⚠️ {label}：資料庫無可用代號，無法使用 yfinance fallback", flush=True)
                  return 0

              print(
                  f"↪ {label}：證交所 API 無法從 GHA 存取，改用 yfinance + DB 清單（{len(symbols)} 檔）...",
                  flush=True,
              )
              start = target_date.isoformat()
              end = (target_date + timedelta(days=1)).isoformat()
              success_count = 0
              batch_size = 50

              for offset in range(0, len(symbols), batch_size):
                  batch = symbols[offset : offset + batch_size]
                  tickers = [f"{code}.{suffix}" for code in batch]
                  batch_no = offset // batch_size + 1
                  batch_total = (len(symbols) + batch_size - 1) // batch_size
                  batch_start = time.perf_counter()
                  log_diag(f"{label} yfinance 批次 {batch_no}/{batch_total}（{len(batch)} 檔）")
                  try:
                      data = yf.download(
                          tickers,
                          start=start,
                          end=end,
                          group_by="ticker",
                          auto_adjust=False,
                          threads=True,
                          progress=False,
                      )
                  except Exception as err:
                      log_diag(
                          f"{label} yfinance 批次 {batch_no} 失敗: {err}，"
                          f"耗時 {diag_elapsed(batch_start):.2f}s",
                          indent=1,
                      )
                      print(f"  ⚠️ yfinance batch 失敗: {err}", flush=True)
                      continue
                  log_diag(
                      f"{label} yfinance 批次 {batch_no} 下載完成，耗時 {diag_elapsed(batch_start):.2f}s",
                      indent=1,
                  )

                  multi_ticker = len(batch) > 1
                  for code in batch:
                      ticker = f"{code}.{suffix}"
                      try:
                          row = yfinance_row_for_ticker(data, ticker, multi_ticker)
                          if row is None:
                              continue
                          close_price = parse_number(row.get("Close"))
                          if not close_price or not (0 < close_price < 30000):
                              continue
                          writer.add(
                              (
                                  ticker,
                                  target_date,
                                  parse_number(row.get("Open")),
                                  parse_number(row.get("High")),
                                  parse_number(row.get("Low")),
                                  close_price,
                                  parse_volume(row.get("Volume")),
                              )
                          )
                          success_count += 1
                      except Exception:
                          continue

                  done = min(offset + batch_size, len(symbols))
                  print(
                      f"  進度: {done}/{len(symbols)}, 成功: {success_count}, "
                      f"已寫入: {writer.total_inserted}",
                      flush=True,
                  )
                  time.sleep(0.5)

              writer.flush()
              print(f"✅ {label}（yfinance）完成：{success_count} 檔", flush=True)
              return success_count


          def parse_number(value):
              if value is None:
                  return None
              text = str(value).strip()
              if text in {"", "--", "-", "----", "X0.00"}:
                  return None
              text = text.replace(",", "")
              try:
                  number = float(text)
                  if number != number:
                      return None
                  return number
              except ValueError:
                  return None


          def parse_volume(value):
              number = parse_number(value)
              if number is None:
                  return 0
              return int(number)


          def is_common_stock_code(code):
              return bool(re.fullmatch(r"\d{4}", str(code or "").strip()))

          INSERT_SQL = """
          INSERT INTO tw_stock_prices
          (symbol, date, open_price, high_price, low_price, close_price, volume)
          VALUES %s
          ON CONFLICT (symbol, date)
          DO UPDATE SET
              open_price = EXCLUDED.open_price,
              high_price = EXCLUDED.high_price,
              low_price = EXCLUDED.low_price,
              close_price = EXCLUDED.close_price,
              volume = EXCLUDED.volume
          """


          def connect_db(db_url):
              return psycopg2.connect(
                  db_url,
                  connect_timeout=30,
                  keepalives=1,
                  keepalives_idle=30,
                  keepalives_interval=10,
                  keepalives_count=5,
              )


          class IncrementalWriter:
              """邊抓取邊寫入：緩衝滿 batch_size 就 flush 到 Neon。"""

              def __init__(self, db_url, batch_size=200):
                  self.db_url = db_url
                  self.batch_size = batch_size
                  self.buffer = []
                  self.lock = threading.Lock()
                  self.total_inserted = 0
                  self.conn = connect_db(db_url)

              def ensure_connection(self):
                  try:
                      if self.conn.closed:
                          raise psycopg2.InterfaceError("connection closed")
                      with self.conn.cursor() as cur:
                          cur.execute("SELECT 1")
                  except Exception:
                      print("  🔄 資料庫連線中斷，正在重新連接...", flush=True)
                      try:
                          self.conn.close()
                      except Exception:
                          pass
                      self.conn = connect_db(self.db_url)
                      print("  ✅ 資料庫重新連接成功", flush=True)

              def add(self, record):
                  with self.lock:
                      self.buffer.append(record)
                      if len(self.buffer) >= self.batch_size:
                          self._flush_unlocked()

              def flush(self):
                  with self.lock:
                      self._flush_unlocked()

              def _flush_unlocked(self):
                  if not self.buffer:
                      return
                  batch = self.buffer
                  self.buffer = []
                  last_error = None
                  for attempt in range(1, 4):
                      try:
                          self.ensure_connection()
                          with self.conn.cursor() as cur:
                              execute_values(cur, INSERT_SQL, batch)
                          self.conn.commit()
                          self.total_inserted += len(batch)
                          print(f"  💾 已同步至資料庫: {self.total_inserted} 筆", flush=True)
                          return
                      except Exception as err:
                          last_error = err
                          print(f"  ⚠️ 寫入失敗 ({attempt}/3): {err}", flush=True)
                          try:
                              self.conn.rollback()
                          except Exception:
                              pass
                          try:
                              self.conn.close()
                          except Exception:
                              pass
                          time.sleep(min(10, 2 ** attempt))
                          try:
                              self.conn = connect_db(self.db_url)
                          except Exception as reconnect_err:
                              last_error = reconnect_err
                  self.buffer = batch + self.buffer
                  raise last_error

              def close(self):
                  try:
                      self.conn.close()
                  except Exception:
                      pass


          def ensure_tables(conn):
              with conn.cursor() as cur:
                  cur.execute(
                      """
                      CREATE TABLE IF NOT EXISTS tw_stock_prices (
                          id SERIAL PRIMARY KEY,
                          symbol VARCHAR(20) NOT NULL,
                          date DATE NOT NULL,
                          open_price DECIMAL(10,2),
                          high_price DECIMAL(10,2),
                          low_price DECIMAL(10,2),
                          close_price DECIMAL(10,2),
                          volume BIGINT,
                          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                          UNIQUE(symbol, date)
                      );
                      """
                  )
                  cur.execute(
                      """
                      CREATE UNIQUE INDEX IF NOT EXISTS tw_stock_prices_symbol_date_idx
                      ON tw_stock_prices(symbol, date);
                      """
                  )
                  cur.execute(
                      """
                      CREATE TABLE IF NOT EXISTS tw_stock_returns (
                          id SERIAL PRIMARY KEY,
                          symbol VARCHAR(20) NOT NULL,
                          date DATE NOT NULL,
                          daily_return DECIMAL(10,6),
                          weekly_return DECIMAL(10,6),
                          monthly_return DECIMAL(10,6),
                          quarterly_return DECIMAL(10,6),
                          yearly_return DECIMAL(10,6),
                          cumulative_return DECIMAL(10,6),
                          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                          UNIQUE(symbol, date)
                      );
                      """
                  )
                  cur.execute(
                      """
                      CREATE UNIQUE INDEX IF NOT EXISTS tw_stock_returns_symbol_date_idx
                      ON tw_stock_returns(symbol, date);
                      """
                  )
              conn.commit()


          def pick_mi_index_table(tables):
              best = None
              best_count = 0
              for table in tables or []:
                  rows = table.get("data") or []
                  title = table.get("title") or ""
                  if len(rows) > best_count and "收盤" in title:
                      best = table
                      best_count = len(rows)
              if best:
                  return best
              for table in tables or []:
                  rows = table.get("data") or []
                  if len(rows) > best_count:
                      best = table
                      best_count = len(rows)
              return best


          def fetch_twse_bulk(writer, target_date):
              phase_start = time.perf_counter()
              print("📥 批量抓取上市收盤行情（MI_INDEX）...", flush=True)
              query_date = f"{target_date.year}{target_date.month:02d}{target_date.day:02d}"
              data = None
              try:
                  data = fetch_twse_mi_index_json(query_date)
              except Exception as err:
                  log_diag(f"上市 MI_INDEX 全部失敗，耗時 {diag_elapsed(phase_start):.2f}s：{err}")
                  print(f"⚠️ 上市 MI_INDEX 不可用: {err}", flush=True)

              success_count = 0
              if data and data.get("stat") == "OK":
                  parse_start = time.perf_counter()
                  table = pick_mi_index_table(data.get("tables"))
                  rows = (table or {}).get("data") or []
                  log_diag(f"MI_INDEX 解析表格：{len(rows)} 列，耗時 {diag_elapsed(parse_start):.2f}s")

                  for row in rows:
                      try:
                          code = str(row[0]).strip()
                          if not is_common_stock_code(code):
                              continue

                          open_price = parse_number(row[5])
                          high_price = parse_number(row[6])
                          low_price = parse_number(row[7])
                          close_price = parse_number(row[8])
                          volume = parse_volume(row[2])

                          if close_price and 0 < close_price < 30000:
                              writer.add(
                                  (
                                      f"{code}.TW",
                                      target_date,
                                      open_price,
                                      high_price,
                                      low_price,
                                      close_price,
                                      volume,
                                  )
                              )
                              success_count += 1
                      except (IndexError, TypeError, ValueError):
                          continue

                  if success_count > 0:
                      writer.flush()
                      log_diag(f"上市 MI_INDEX 寫入完成，總耗時 {diag_elapsed(phase_start):.2f}s")
                      print(f"✅ 上市股票完成：{success_count} 檔", flush=True)
                      return success_count

              log_diag("MI_INDEX 無可用資料，準備改用 yfinance fallback")
              symbols = load_symbols_from_db(writer.conn, "TWSE")
              result = fetch_market_yfinance_fallback(writer, target_date, symbols, "TW", "上市股票")
              log_diag(f"上市抓取階段結束，總耗時 {diag_elapsed(phase_start):.2f}s")
              return result


          def fetch_tpex_bulk(writer, target_date):
              phase_start = time.perf_counter()
              print("📥 批量抓取上櫃收盤行情...", flush=True)
              roc_date = f"{target_date.year - 1911}/{target_date.month:02d}/{target_date.day:02d}"
              data = None
              try:
                  data = get_json(
                      "https://www.tpex.org.tw/web/stock/aftertrading/otc_quotes_no1430/stk_wn1430_result.php",
                      params={"l": "zh-tw", "d": roc_date, "se": "AL"},
                      referer=TPEX_REFERER,
                      retries=2,
                      label="TPEX 上櫃 bulk",
                  )
              except Exception as err:
                  log_diag(f"上櫃 bulk API 失敗，耗時 {diag_elapsed(phase_start):.2f}s：{err}")
                  print(f"⚠️ 上櫃 bulk API 不可用: {err}", flush=True)

              success_count = 0
              if data:
                  tables = data.get("tables") or []
                  rows = tables[0].get("data") if tables else []

                  for row in rows:
                      try:
                          code = str(row[0]).strip()
                          if not is_common_stock_code(code):
                              continue

                          close_price = parse_number(row[2])
                          open_price = parse_number(row[4])
                          high_price = parse_number(row[5])
                          low_price = parse_number(row[6])
                          volume = parse_volume(row[7])

                          if close_price and 0 < close_price < 30000:
                              writer.add(
                                  (
                                      f"{code}.TWO",
                                      target_date,
                                      open_price,
                                      high_price,
                                      low_price,
                                      close_price,
                                      volume,
                                  )
                              )
                              success_count += 1
                      except (IndexError, TypeError, ValueError):
                          continue

                  if success_count > 0:
                      writer.flush()
                      print(f"✅ 上櫃股票完成：{success_count} 檔", flush=True)
                      return success_count

              symbols = load_symbols_from_db(writer.conn, "TPEX")
              return fetch_market_yfinance_fallback(writer, target_date, symbols, "TWO", "上櫃股票")


          def fetch_twii_single_day(target_date):
              print("📈 嘗試從 yfinance 抓取加權指數 (^TWII)...", flush=True)
              try:
                  start = target_date.strftime("%Y-%m-%d")
                  end = (target_date + timedelta(days=1)).strftime("%Y-%m-%d")
                  df = yf.Ticker("^TWII").history(start=start, end=end, auto_adjust=False)
                  if df is None or df.empty:
                      print("⚠️ yfinance 未回傳當日 ^TWII 資料", flush=True)
                      return None

                  row = df.iloc[0]

                  def to_float(value):
                      try:
                          if value is None:
                              return None
                          number = float(value)
                          return None if number != number else number
                      except Exception:
                          return None

                  def to_int(value):
                      try:
                          if value is None:
                              return 0
                          number = float(value)
                          return 0 if number != number else int(number)
                      except Exception:
                          return 0

                  close_price = to_float(row.get("Close"))
                  if close_price is None:
                      print("⚠️ yfinance 缺少收盤價，略過 ^TWII", flush=True)
                      return None

                  return (
                      "^TWII",
                      target_date,
                      to_float(row.get("Open")),
                      to_float(row.get("High")),
                      to_float(row.get("Low")),
                      close_price,
                      to_int(row.get("Volume")),
                  )
              except Exception as err:
                  print(f"⚠️ 加權指數 (^TWII) yfinance 抓取失敗: {err}", flush=True)
                  return None


          def compute_returns(writer, target_date):
              print("\n🧮 計算並回寫今日報酬率到 tw_stock_returns...", flush=True)
              writer.ensure_connection()
              conn = writer.conn
              last_error = None
              for attempt in range(1, 4):
                  try:
                      writer.ensure_connection()
                      conn = writer.conn
                      with conn.cursor() as cur:
                          cur.execute(
                              """
                              WITH s AS (
                                  SELECT
                                      symbol,
                                      date,
                                      close_price,
                                      LAG(close_price, 1)   OVER (PARTITION BY symbol ORDER BY date) AS prev_1,
                                      LAG(close_price, 5)   OVER (PARTITION BY symbol ORDER BY date) AS prev_5,
                                      LAG(close_price, 21)  OVER (PARTITION BY symbol ORDER BY date) AS prev_21,
                                      LAG(close_price, 63)  OVER (PARTITION BY symbol ORDER BY date) AS prev_63,
                                      LAG(close_price, 252) OVER (PARTITION BY symbol ORDER BY date) AS prev_252
                                  FROM tw_stock_prices
                                  WHERE date >= %s - INTERVAL '1000 days' AND date <= %s
                              ), firsts AS (
                                  SELECT DISTINCT ON (symbol)
                                      symbol,
                                      close_price AS first_close
                                  FROM tw_stock_prices
                                  ORDER BY symbol, date ASC
                              ), t AS (
                                  SELECT
                                      s.symbol,
                                      s.date,
                                      CASE WHEN s.close_price IS NULL OR s.prev_1 IS NULL OR s.prev_1 = 0
                                           THEN NULL ELSE ROUND((s.close_price/s.prev_1 - 1)::numeric, 6) END AS daily_return,
                                      CASE WHEN s.close_price IS NULL OR s.prev_5 IS NULL OR s.prev_5 = 0
                                           THEN NULL ELSE ROUND((s.close_price/s.prev_5 - 1)::numeric, 6) END AS weekly_return,
                                      CASE WHEN s.close_price IS NULL OR s.prev_21 IS NULL OR s.prev_21 = 0
                                           THEN NULL ELSE ROUND((s.close_price/s.prev_21 - 1)::numeric, 6) END AS monthly_return,
                                      CASE WHEN s.close_price IS NULL OR s.prev_63 IS NULL OR s.prev_63 = 0
                                           THEN NULL ELSE ROUND((s.close_price/s.prev_63 - 1)::numeric, 6) END AS quarterly_return,
                                      CASE WHEN s.close_price IS NULL OR s.prev_252 IS NULL OR s.prev_252 = 0
                                           THEN NULL ELSE ROUND((s.close_price/s.prev_252 - 1)::numeric, 6) END AS yearly_return,
                                      CASE WHEN s.close_price IS NULL OR f.first_close IS NULL OR f.first_close = 0
                                           THEN NULL ELSE ROUND((s.close_price/f.first_close - 1)::numeric, 6) END AS cumulative_return
                                  FROM s
                                  JOIN firsts f ON f.symbol = s.symbol
                                  WHERE s.date = %s
                              )
                              INSERT INTO tw_stock_returns (
                                  symbol, date, daily_return, weekly_return, monthly_return,
                                  quarterly_return, yearly_return, cumulative_return
                              )
                              SELECT
                                  symbol, date, daily_return, weekly_return, monthly_return,
                                  quarterly_return, yearly_return, cumulative_return
                              FROM t
                              ON CONFLICT (symbol, date) DO UPDATE SET
                                  daily_return = EXCLUDED.daily_return,
                                  weekly_return = EXCLUDED.weekly_return,
                                  monthly_return = EXCLUDED.monthly_return,
                                  quarterly_return = EXCLUDED.quarterly_return,
                                  yearly_return = EXCLUDED.yearly_return,
                                  cumulative_return = EXCLUDED.cumulative_return;
                              """,
                              (target_date, target_date, target_date),
                          )
                          conn.commit()
                          cur.execute(
                              "SELECT COUNT(*) FROM tw_stock_returns WHERE date = %s",
                              (target_date,),
                          )
                          today_count = cur.fetchone()[0]
                      print(f"✅ 今日報酬率已寫入/更新 {today_count} 筆", flush=True)
                      return
                  except Exception as err:
                      last_error = err
                      print(f"  ⚠️ 報酬率計算失敗 ({attempt}/3): {err}", flush=True)
                      try:
                          conn.rollback()
                      except Exception:
                          pass
                      time.sleep(min(10, 2 ** attempt))
              raise last_error


          print("=" * 80, flush=True)
          print("🚀 開始執行 GitHub Actions 股價資料抓取任務", flush=True)
          print("=" * 80, flush=True)
          print(f"⏰ 執行時間：{datetime.now()}", flush=True)
          print(f"📅 目標日期：{date.today()}", flush=True)
          print(
              f"🖥️ Runner：{os.environ.get('RUNNER_OS', '?')} / "
              f"{os.environ.get('RUNNER_ARCH', '?')} / "
              f"{os.environ.get('RUNNER_NAME', 'github-hosted')}",
              flush=True,
          )
          print(flush=True)

          NEON_DB_URL = os.environ.get("NEON_DATABASE_URL")
          if not NEON_DB_URL:
              print("❌ 錯誤：未設定 NEON_DATABASE_URL", flush=True)
              sys.exit(1)

          writer = None
          try:
              print("🔌 正在連接 Neon 資料庫...", flush=True)
              writer = IncrementalWriter(NEON_DB_URL, batch_size=200)
              print("✅ 已連接到 Neon 資料庫", flush=True)
              ensure_tables(writer.conn)

              today = date.today()

              twse_count = fetch_twse_bulk(writer, today)
              tpex_count = fetch_tpex_bulk(writer, today)
              print(f"\n📦 上市/上櫃合計：{twse_count + tpex_count} 檔", flush=True)

              index_record = fetch_twii_single_day(today)
              if index_record:
                  writer.add(index_record)
                  writer.flush()
                  print("📈 已加入加權指數資料", flush=True)
              else:
                  print("⚠️ 本次未取得加權指數 (^TWII) 資料", flush=True)

              if writer.total_inserted == 0:
                  print("⚠️  今日無資料可同步（可能是非交易日或資料尚未公布）", flush=True)
                  print("✅ 任務完成（無資料更新）", flush=True)
                  sys.exit(0)

              print(f"\n✅ 股價資料同步完成，共 {writer.total_inserted} 筆", flush=True)
              compute_returns(writer, today)

              print(flush=True)
              print("=" * 80, flush=True)
              print("🎉 GitHub Actions 任務執行完成！", flush=True)
              print("=" * 80, flush=True)
          except Exception as err:
              print(f"❌ 執行過程發生錯誤：{err}", flush=True)
              import traceback
              traceback.print_exc()
              sys.exit(1)
          finally:
              if writer is not None:
                  writer.close()

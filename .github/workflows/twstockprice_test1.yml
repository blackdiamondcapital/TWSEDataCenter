      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-logs-${{ github.run_number }}
          path: |
            *.log
          retention-days: 30

      - name: Send notification on failure
        if: failure()
        run: |
          echo "❌ 資料抓取失敗，請檢查日誌"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run Number: ${{ github.run_number }}"

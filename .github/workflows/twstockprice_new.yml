name: Daily Stock Data Fetch

on:
  schedule:
    - cron: '57 3 * * 1-5'
  workflow_dispatch:

env:
  TZ: Asia/Taipei

jobs:
  fetch-stock-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests psycopg2-binary beautifulsoup4 yfinance

      - name: Fetch stock data and sync to Neon, then compute returns
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          PYTHONUNBUFFERED: 1
        run: |
          python3 -u << 'PYTHON_SCRIPT'
          import os
          import sys
          import time
          import threading
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from datetime import date, datetime, timedelta

          import psycopg2
          import requests
          import yfinance as yf
          from bs4 import BeautifulSoup
          from psycopg2.extras import execute_values
          from requests.adapters import HTTPAdapter
          from urllib3.util.retry import Retry

          sys.stdout.flush()
          sys.stderr.flush()

          HEADERS = {
              "User-Agent": (
                  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                  "AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
              ),
              "Accept": "text/html,application/json,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "zh-TW,zh;q=0.9,en-US;q=0.8,en;q=0.7",
              "Connection": "keep-alive",
          }

          INSERT_SQL = """
          INSERT INTO tw_stock_prices
          (symbol, date, open_price, high_price, low_price, close_price, volume)
          VALUES %s
          ON CONFLICT (symbol, date)
          DO UPDATE SET
              open_price = EXCLUDED.open_price,
              high_price = EXCLUDED.high_price,
              low_price = EXCLUDED.low_price,
              close_price = EXCLUDED.close_price,
              volume = EXCLUDED.volume
          """


          def build_session():
              session = requests.Session()
              retry = Retry(
                  total=5,
                  connect=5,
                  read=5,
                  backoff_factor=1.5,
                  status_forcelist=[429, 500, 502, 503, 504],
                  allowed_methods=["GET"],
                  raise_on_status=False,
              )
              adapter = HTTPAdapter(max_retries=retry, pool_connections=50, pool_maxsize=50)
              session.mount("http://", adapter)
              session.mount("https://", adapter)
              session.headers.update(HEADERS)
              return session


          SESSION = build_session()


          class IncrementalWriter:
              def __init__(self, conn, batch_size=500):
                  self.conn = conn
                  self.batch_size = batch_size
                  self.buffer = []
                  self.lock = threading.Lock()
                  self.total_inserted = 0

              def add(self, record):
                  with self.lock:
                      self.buffer.append(record)
                      if len(self.buffer) >= self.batch_size:
                          self._flush_unlocked()

              def flush(self):
                  with self.lock:
                      self._flush_unlocked()

              def _flush_unlocked(self):
                  if not self.buffer:
                      return
                  batch = self.buffer
                  self.buffer = []
                  try:
                      with self.conn.cursor() as cur:
                          execute_values(cur, INSERT_SQL, batch)
                      self.conn.commit()
                      self.total_inserted += len(batch)
                      print(f"  💾 已同步至資料庫: {self.total_inserted} 筆", flush=True)
                  except Exception as err:
                      self.conn.rollback()
                      print(f"  ⚠️ flush 失敗，本批 {len(batch)} 筆：{err}", flush=True)
                      raise


          def ensure_tables(conn):
              with conn.cursor() as cur:
                  cur.execute(
                      """
                      CREATE TABLE IF NOT EXISTS tw_stock_prices (
                          id SERIAL PRIMARY KEY,
                          symbol VARCHAR(20) NOT NULL,
                          date DATE NOT NULL,
                          open_price DECIMAL(10,2),
                          high_price DECIMAL(10,2),
                          low_price DECIMAL(10,2),
                          close_price DECIMAL(10,2),
                          volume BIGINT,
                          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                          UNIQUE(symbol, date)
                      );
                      """
                  )
                  cur.execute(
                      """
                      CREATE UNIQUE INDEX IF NOT EXISTS tw_stock_prices_symbol_date_idx
                      ON tw_stock_prices(symbol, date);
                      """
                  )
                  cur.execute(
                      """
                      CREATE TABLE IF NOT EXISTS tw_stock_returns (
                          id SERIAL PRIMARY KEY,
                          symbol VARCHAR(20) NOT NULL,
                          date DATE NOT NULL,
                          daily_return DECIMAL(10,6),
                          weekly_return DECIMAL(10,6),
                          monthly_return DECIMAL(10,6),
                          quarterly_return DECIMAL(10,6),
                          yearly_return DECIMAL(10,6),
                          cumulative_return DECIMAL(10,6),
                          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                          UNIQUE(symbol, date)
                      );
                      """
                  )
                  cur.execute(
                      """
                      CREATE UNIQUE INDEX IF NOT EXISTS tw_stock_returns_symbol_date_idx
                      ON tw_stock_returns(symbol, date);
                      """
                  )
              conn.commit()


          def safe_get(url, *, params=None, timeout=90, encoding=None):
              last_err = None
              for attempt in range(1, 4):
                  try:
                      response = SESSION.get(url, params=params, timeout=timeout)
                      if encoding:
                          response.encoding = encoding
                      return response
                  except Exception as err:
                      last_err = err
                      print(f"    第 {attempt} 次請求失敗: {url} -> {err}", flush=True)
                      if attempt < 3:
                          time.sleep(attempt * 2)
              raise last_err


          def parse_isin_symbols(html_text, exclude_non_stock=False):
              soup = BeautifulSoup(html_text, "html.parser")
              symbols = []
              exclude_keywords = ["ETF", "DR", "TDR", "認購", "認售", "債券", "受益證券", "基金"]

              for row in soup.find_all("tr"):
                  cols = row.find_all("td")
                  if len(cols) < 5:
                      continue
                  code_name = cols[0].text.strip()
                  if "\u3000" not in code_name:
                      continue
                  if exclude_non_stock:
                      security_type = cols[1].text.strip() if len(cols) > 1 else ""
                      if any(keyword in security_type for keyword in exclude_keywords):
                          continue
                  parts = code_name.split("\u3000")
                  if len(parts) == 2 and parts[0].isdigit() and len(parts[0]) == 4:
                      symbols.append(parts[0])
              return sorted(set(symbols))


          def get_symbols_from_mops_csv(listed=True):
              path = "t187ap03_L.csv" if listed else "t187ap03_O.csv"
              url = f"https://mopsfin.twse.com.tw/opendata/{path}"
              response = safe_get(url, timeout=120, encoding="utf-8-sig")
              symbols = []
              for line in response.text.splitlines()[1:]:
                  if not line.strip():
                      continue
                  parts = line.split(",")
                  if len(parts) < 2:
                      continue
                  code = parts[1].strip().strip('"')
                  if code.isdigit() and len(code) == 4:
                      symbols.append(code)
              return sorted(set(symbols))


          def fetch_isin_symbols(str_mode, exclude_non_stock=False, timeout=120):
              url = f"https://isin.twse.com.tw/isin/C_public.jsp?strMode={str_mode}"
              response = safe_get(url, timeout=timeout, encoding="big5")
              print(
                  f"  ISIN strMode={str_mode}: HTTP {response.status_code}, "
                  f"body {len(response.text)} chars",
                  flush=True,
              )
              return parse_isin_symbols(response.text, exclude_non_stock=exclude_non_stock)


          def get_stock_symbols():
              print("📋 取得股票清單...", flush=True)

              twse_symbols = []
              tpex_symbols = []

              try:
                  print("  ⏳ 正在抓取上市股票清單...", flush=True)
                  twse_symbols = fetch_isin_symbols(2)
                  print(f"✅ 上市股票（ISIN）：{len(twse_symbols)} 檔", flush=True)
              except Exception as err:
                  print(f"⚠️  無法取得上市 ISIN 清單: {err}", flush=True)

              if not twse_symbols:
                  try:
                      print("  ↪ 改用 MOPS 開放資料 CSV 取得上市清單...", flush=True)
                      twse_symbols = get_symbols_from_mops_csv(listed=True)
                      print(f"✅ 上市股票（MOPS）：{len(twse_symbols)} 檔", flush=True)
                  except Exception as err:
                      print(f"⚠️  無法取得上市 MOPS 清單: {err}", flush=True)

              try:
                  print("  ⏳ 正在抓取上櫃股票清單...", flush=True)
                  tpex_symbols = fetch_isin_symbols(4, exclude_non_stock=True)
                  print(f"✅ 上櫃股票（ISIN）：{len(tpex_symbols)} 檔", flush=True)
              except Exception as err:
                  print(f"⚠️  無法取得上櫃 ISIN 清單: {err}", flush=True)

              if not tpex_symbols:
                  try:
                      print("  ↪ 改用 MOPS 開放資料 CSV 取得上櫃清單...", flush=True)
                      tpex_symbols = get_symbols_from_mops_csv(listed=False)
                      print(f"✅ 上櫃股票（MOPS）：{len(tpex_symbols)} 檔", flush=True)
                  except Exception as err:
                      print(f"⚠️  無法取得上櫃 MOPS 清單: {err}", flush=True)

              return twse_symbols, tpex_symbols


          def fetch_stock_data_single_day(symbol, target_date, is_twse=True):
              year = target_date.year
              month = target_date.month
              day = target_date.day

              try:
                  if is_twse:
                      url = "https://www.twse.com.tw/exchangeReport/STOCK_DAY"
                      params = {
                          "response": "json",
                          "date": f"{year}{month:02d}01",
                          "stockNo": symbol,
                      }
                      response = safe_get(url, params=params, timeout=20)
                      if response.status_code != 200:
                          return None

                      data = response.json()
                      if data.get("stat") == "OK" and data.get("data"):
                          for row in data["data"]:
                              try:
                                  date_parts = row[0].split("/")
                                  if len(date_parts) != 3:
                                      continue
                                  trade_date = date(
                                      int(date_parts[0]) + 1911,
                                      int(date_parts[1]),
                                      int(date_parts[2]),
                                  )
                                  if trade_date != target_date:
                                      continue

                                  volume = int(row[1].replace(",", "")) if row[1] != "--" else 0
                                  open_price = float(row[3].replace(",", "")) if row[3] != "--" else None
                                  high_price = float(row[4].replace(",", "")) if row[4] != "--" else None
                                  low_price = float(row[5].replace(",", "")) if row[5] != "--" else None
                                  close_price = float(row[6].replace(",", "")) if row[6] != "--" else None

                                  if close_price and 0 < close_price < 30000:
                                      return (
                                          f"{symbol}.TW",
                                          target_date,
                                          open_price,
                                          high_price,
                                          low_price,
                                          close_price,
                                          volume,
                                      )
                              except (ValueError, IndexError):
                                  continue
                  else:
                      roc_date = f"{year - 1911}/{month:02d}/{day:02d}"
                      url = (
                          "https://www.tpex.org.tw/web/stock/aftertrading/"
                          "otc_quotes_no1430/stk_wn1430_result.php"
                      )
                      params = {"l": "zh-tw", "d": roc_date, "se": "AL"}
                      response = safe_get(url, params=params, timeout=20)
                      if response.status_code != 200:
                          return None

                      data = response.json()
                      if data.get("tables"):
                          for row in data["tables"][0].get("data", []):
                              try:
                                  if row[0].strip() != symbol:
                                      continue

                                  close_price = float(row[2].replace(",", "")) if row[2] not in ["-", "----", ""] else None
                                  open_price = float(row[4].replace(",", "")) if row[4] not in ["-", "----", ""] else None
                                  high_price = float(row[5].replace(",", "")) if row[5] not in ["-", "----", ""] else None
                                  low_price = float(row[6].replace(",", "")) if row[6] not in ["-", "----", ""] else None
                                  volume = int(row[7].replace(",", "")) if row[7] not in ["-", "0", ""] else 0

                                  if close_price and 0 < close_price < 30000:
                                      return (
                                          f"{symbol}.TWO",
                                          target_date,
                                          open_price,
                                          high_price,
                                          low_price,
                                          close_price,
                                          volume,
                                      )
                              except (ValueError, IndexError):
                                  continue
              except Exception:
                  pass

              return None


          def fetch_twii_single_day(target_date):
              print("📈 嘗試從 yfinance 抓取加權指數 (^TWII)...", flush=True)
              try:
                  start = target_date.strftime("%Y-%m-%d")
                  end = (target_date + timedelta(days=1)).strftime("%Y-%m-%d")
                  df = yf.Ticker("^TWII").history(start=start, end=end, auto_adjust=False)
                  if df is None or df.empty:
                      print("⚠️ yfinance 未回傳當日 ^TWII 資料", flush=True)
                      return None

                  row = df.iloc[0]

                  def to_float(value):
                      try:
                          if value is None:
                              return None
                          number = float(value)
                          return None if number != number else number
                      except Exception:
                          return None

                  def to_int(value):
                      try:
                          if value is None:
                              return 0
                          number = float(value)
                          return 0 if number != number else int(number)
                      except Exception:
                          return 0

                  close_price = to_float(row.get("Close"))
                  if close_price is None:
                      return None

                  return (
                      "^TWII",
                      target_date,
                      to_float(row.get("Open")),
                      to_float(row.get("High")),
                      to_float(row.get("Low")),
                      close_price,
                      to_int(row.get("Volume")),
                  )
              except Exception as err:
                  print(f"⚠️ 加權指數 (^TWII) yfinance 抓取失敗: {err}", flush=True)
                  return None


          def fetch_market(writer, symbols, target_date, is_twse, label):
              success_count = 0

              def fetch_and_write(symbol):
                  result = fetch_stock_data_single_day(symbol, target_date, is_twse)
                  if result:
                      writer.add(result)
                  time.sleep(0.3)
                  return result is not None

              print(f"📥 邊抓邊寫 — {label}（10 併發）...", flush=True)
              with ThreadPoolExecutor(max_workers=10) as executor:
                  futures = {executor.submit(fetch_and_write, symbol): symbol for symbol in symbols}
                  for index, future in enumerate(as_completed(futures), 1):
                      try:
                          if future.result():
                              success_count += 1
                      except Exception as err:
                          symbol = futures[future]
                          print(f"  ⚠️ {label} {symbol} 失敗: {err}", flush=True)

                      if index % 50 == 0 or index == len(symbols):
                          print(
                              f"  進度: {index}/{len(symbols)}, 成功: {success_count}, 已寫入: {writer.total_inserted}",
                              flush=True,
                          )

              writer.flush()
              print(f"✅ {label}完成：{success_count} / {len(symbols)} 檔", flush=True)
              return success_count


          def compute_returns(conn, target_date):
              print("\n🧮 計算並回寫今日報酬率到 tw_stock_returns...", flush=True)
              with conn.cursor() as cur:
                  cur.execute(
                      """
                      WITH s AS (
                          SELECT
                              symbol,
                              date,
                              close_price,
                              LAG(close_price, 1)   OVER (PARTITION BY symbol ORDER BY date) AS prev_1,
                              LAG(close_price, 5)   OVER (PARTITION BY symbol ORDER BY date) AS prev_5,
                              LAG(close_price, 21)  OVER (PARTITION BY symbol ORDER BY date) AS prev_21,
                              LAG(close_price, 63)  OVER (PARTITION BY symbol ORDER BY date) AS prev_63,
                              LAG(close_price, 252) OVER (PARTITION BY symbol ORDER BY date) AS prev_252
                          FROM tw_stock_prices
                          WHERE date >= %s - INTERVAL '1000 days' AND date <= %s
                      ), firsts AS (
                          SELECT DISTINCT ON (symbol)
                              symbol,
                              close_price AS first_close
                          FROM tw_stock_prices
                          ORDER BY symbol, date ASC
                      ), t AS (
                          SELECT
                              s.symbol,
                              s.date,
                              CASE WHEN s.close_price IS NULL OR s.prev_1 IS NULL OR s.prev_1 = 0
                                   THEN NULL ELSE ROUND((s.close_price/s.prev_1 - 1)::numeric, 6) END AS daily_return,
                              CASE WHEN s.close_price IS NULL OR s.prev_5 IS NULL OR s.prev_5 = 0
                                   THEN NULL ELSE ROUND((s.close_price/s.prev_5 - 1)::numeric, 6) END AS weekly_return,
                              CASE WHEN s.close_price IS NULL OR s.prev_21 IS NULL OR s.prev_21 = 0
                                   THEN NULL ELSE ROUND((s.close_price/s.prev_21 - 1)::numeric, 6) END AS monthly_return,
                              CASE WHEN s.close_price IS NULL OR s.prev_63 IS NULL OR s.prev_63 = 0
                                   THEN NULL ELSE ROUND((s.close_price/s.prev_63 - 1)::numeric, 6) END AS quarterly_return,
                              CASE WHEN s.close_price IS NULL OR s.prev_252 IS NULL OR s.prev_252 = 0
                                   THEN NULL ELSE ROUND((s.close_price/s.prev_252 - 1)::numeric, 6) END AS yearly_return,
                              CASE WHEN s.close_price IS NULL OR f.first_close IS NULL OR f.first_close = 0
                                   THEN NULL ELSE ROUND((s.close_price/f.first_close - 1)::numeric, 6) END AS cumulative_return
                          FROM s
                          JOIN firsts f ON f.symbol = s.symbol
                          WHERE s.date = %s
                      )
                      INSERT INTO tw_stock_returns (
                          symbol, date, daily_return, weekly_return, monthly_return,
                          quarterly_return, yearly_return, cumulative_return
                      )
                      SELECT
                          symbol, date, daily_return, weekly_return, monthly_return,
                          quarterly_return, yearly_return, cumulative_return
                      FROM t
                      ON CONFLICT (symbol, date) DO UPDATE SET
                          daily_return = EXCLUDED.daily_return,
                          weekly_return = EXCLUDED.weekly_return,
                          monthly_return = EXCLUDED.monthly_return,
                          quarterly_return = EXCLUDED.quarterly_return,
                          yearly_return = EXCLUDED.yearly_return,
                          cumulative_return = EXCLUDED.cumulative_return;
                      """,
                      (target_date, target_date, target_date),
                  )
                  conn.commit()
                  cur.execute("SELECT COUNT(*) FROM tw_stock_returns WHERE date = %s", (target_date,))
                  today_count = cur.fetchone()[0]
              print(f"✅ 今日報酬率已寫入/更新 {today_count} 筆", flush=True)


          print("=" * 80, flush=True)
          print("🚀 開始執行 GitHub Actions 股價資料抓取任務", flush=True)
          print("=" * 80, flush=True)
          print(f"⏰ 執行時間：{datetime.now()}", flush=True)
          print(f"📅 目標日期：{date.today()}", flush=True)
          print(flush=True)

          NEON_DB_URL = os.environ.get("NEON_DATABASE_URL")
          if not NEON_DB_URL:
              print("❌ 錯誤：未設定 NEON_DATABASE_URL", flush=True)
              sys.exit(1)

          conn = None
          try:
              print("🔌 正在連接 Neon 資料庫...", flush=True)
              conn = psycopg2.connect(NEON_DB_URL)
              print("✅ 已連接到 Neon 資料庫", flush=True)
              ensure_tables(conn)

              today = date.today()
              twse_symbols, tpex_symbols = get_stock_symbols()
              total_symbols = len(twse_symbols) + len(tpex_symbols)

              if total_symbols == 0:
                  print("❌ 無法取得股票清單", flush=True)
                  sys.exit(1)

              print(f"\n📊 準備抓取 {total_symbols} 檔股票資料", flush=True)
              print(f"   上市：{len(twse_symbols)} 檔", flush=True)
              print(f"   上櫃：{len(tpex_symbols)} 檔", flush=True)
              print(flush=True)

              writer = IncrementalWriter(conn, batch_size=500)

              fetch_market(writer, twse_symbols, today, True, "上市股票")
              fetch_market(writer, tpex_symbols, today, False, "上櫃股票")

              index_record = fetch_twii_single_day(today)
              if index_record:
                  writer.add(index_record)
                  writer.flush()
                  print("📈 已加入加權指數資料", flush=True)
              else:
                  print("⚠️ 本次未取得加權指數 (^TWII) 資料", flush=True)

              if writer.total_inserted == 0:
                  print("⚠️ 今日無資料可同步（可能是非交易日或資料尚未公布）", flush=True)
                  print("✅ 任務完成（無資料更新）", flush=True)
                  sys.exit(0)

              print(f"\n✅ 股價資料同步完成，共 {writer.total_inserted} 筆", flush=True)
              compute_returns(conn, today)

              print("=" * 80, flush=True)
              print("🎉 GitHub Actions 任務執行完成！", flush=True)
              print("=" * 80, flush=True)

          except Exception as err:
              print(f"❌ 執行過程發生錯誤：{err}", flush=True)
              import traceback
              traceback.print_exc()
              sys.exit(1)
          finally:
              if conn is not None:
                  conn.close()
          PYTHON_SCRIPT

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-logs-${{ github.run_number }}
          path: |
            *.log
          retention-days: 30

      - name: Send notification on failure
        if: failure()
        run: |
          echo "❌ 資料抓取失敗，請檢查日誌"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run Number: ${{ github.run_number }}"
